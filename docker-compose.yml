services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: m4rkim
      POSTGRES_PASSWORD: m4rkim_dev
      POSTGRES_DB: m4rkim_dev
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U m4rkim -d m4rkim_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
